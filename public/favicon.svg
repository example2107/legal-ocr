<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#2d5a8e"/>
  <!-- Scales of justice -->
  <!-- Top bar -->
  <rect x="15" y="5" width="2" height="16" rx="1" fill="white"/>
  <!-- Horizontal beam -->
  <rect x="6" y="8" width="20" height="2" rx="1" fill="white"/>
  <!-- Left scale chain -->
  <rect x="8.5" y="10" width="1" height="5" rx="0.5" fill="white"/>
  <!-- Right scale chain -->
  <rect x="22.5" y="10" width="1" height="5" rx="0.5" fill="white"/>
  <!-- Left scale bowl -->
  <path d="M6 15 Q9 18 12 15" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Right scale bowl -->
  <path d="M20 15 Q23 18 26 15" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="12" y="21" width="8" height="1.5" rx="0.75" fill="white"/>
  <rect x="10" y="23" width="12" height="2" rx="1" fill="white"/>
</svg>
